# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/otshield_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Close the EntityManager (and therefore release the JDBC connection)
# as soon as the @Transactional service method returns, instead of at
# the end of the HTTP request. Our SseEmitter endpoints keep the request
# alive for minutes while streaming tokens from Ollama - with the default
# open-in-view=true, every chat held one Hikari connection open for the
# whole stream and triggered "Apparent connection leak detected" after
# 60s. Disabling OSIV is the standard fix and doesn't affect us because
# nothing lazy-loads entities outside a service boundary.
spring.jpa.open-in-view=false

# Database Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=604800000

# File Upload Configuration
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
spring.servlet.multipart.enabled=true

# WebSocket Configuration
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536
spring.websocket.max-sessions=100

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.example.loginapp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.safetech.otshield=DEBUG
logging.level.com.safetech.otshield.controller.HoneypotController=DEBUG
logging.level.com.safetech.otshield.service.HoneypotLogService=DEBUG
logging.level.com.safetech.otshield.repository.HoneypotLogRepository=DEBUG

# HTTP Response Compression
server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024 

# Conpot: Python with Conpot installed (use this Python, not 3.14, for real Conpot)
conpot.python.path=C:\\Users\\Fancy\\AppData\\Local\\Programs\\Python\\Python311\\python.exe

# Runtime: "docker" (local Docker container), "python" (legacy subprocess),
# or "remote" (Conpot runs elsewhere — e.g. on a GCP VM — and ships logs
# via the /api/honeypot/ingest endpoint). With "remote" the local Start
# Conpot button is disabled and no local container is spawned.
conpot.runtime=remote
# Docker image tag for Conpot (honeynet is the upstream community image)
conpot.docker.image=honeynet/conpot:latest
# Container name so stop/restart can target it
conpot.docker.container-name=otshield-conpot
# Optional: explicit path to docker CLI if not on PATH (e.g. C:\\Program Files\\Docker\\Docker\\resources\\bin\\docker.exe)
conpot.docker.path=

# GeoIP: path to the MaxMind GeoLite2-City.mmdb file (offline IP -> country/city lookup).
# Download the free DB from https://www.maxmind.com/ (see MAXMIND_SETUP.md). If missing,
# geolocation silently returns UNKNOWN and the backend keeps working.
geoip.database.path=geoip/GeoLite2-City.mmdb

# Honeypot ingest token — used by remote Conpot sidecars (e.g. GCP VM forwarder)
# to authenticate to POST /api/honeypot/ingest. Generate a long random string
# and keep it secret. Same value goes into the sidecar's env var.
honeypot.ingest.token=GcZ9KY7ANmLfvob6SOWxnRBjVlEPX2uaMr805td4IHTCezyU

# Honeypot Configuration
honeypot.logs.endpoint=/api/honeypot/logs
honeypot.logs.enabled=true
honeypot.logs.retention-days=30

slack.webhook.url=https://hooks.slack.com/services/XXX/YYY/ZZZ

# OTShield AI Assistant (local Ollama, RAG-based)
ollama.base-url=http://localhost:11434
ollama.chat-model=llama3.2:1b-instruct-q4_K_M
ollama.embedding-model=nomic-embed-text
ollama.timeout-seconds=300
ollama.retrieval-top-k=4
ollama.min-relevance=0.18
ollama.warmup-on-startup=true
ollama.num-thread=4
ollama.num-ctx=2048
ollama.num-predict=384